<!DOCTYPE html>
<!-- V52：共同備忘錄文字精簡；紹薇工作事項排序改小箭頭無底色 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>麗卉待辦 V52 共同備忘錄文字精簡</title>
<style>
  :root{
    --bg:#fffafc; --card:#ffffff; --line:#ead9e2; --text:#2f3440; --muted:#7b8090;
    --top:#fde9ef; --top2:#f8dbe4;
    --high-bg:#fff2f3; --high-head:#f8d6dc; --high-bd:#ecc0c9;
    --mid-bg:#eef5ff; --mid-head:#d9e8ff; --mid-bd:#c3d7fb;
    --wait-bg:#f6f2fb; --wait-head:#e7ddf8; --wait-bd:#d7c7ef;
    --calendar-bg:#ffffff; --calendar-head:#f7f9fc; --calendar-bd:#e3e8ef;
    --today:#fff7c9; --done-bg:#edf6ef; --done-text:#708076;
    --danger:#c53e4f; --danger-bg:#fff1f4; --tag:#f5e4ea; --tag-border:#e9bccb; --tag-active:#de8fa6;
    --shadow:0 8px 24px rgba(73,60,83,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;background:linear-gradient(180deg,#fff9fb,#fff);color:var(--text)}
  .page{width:min(1680px, calc(100vw - 24px));margin:12px auto 22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
  .cardHead{padding:9px 16px;min-height:38px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:17px;font-weight:900;background:linear-gradient(90deg,var(--top),var(--top2))}
  .compact1cm{min-height:1cm !important;padding:4px 14px !important}
  .cardBody{padding:12px}
  .topClock{font-size:15px;font-weight:900;color:#5f6677;white-space:nowrap}
  .statusText{font-size:13px;color:#708076;font-weight:800}
  .input, textarea, button, select{font-family:inherit}
  .input, .select{
    width:100%;border:1px solid #d7dcea;background:#fff;color:var(--text);border-radius:14px;padding:11px 12px;font-size:15px;outline:none
  }
  .input:focus, .select:focus, textarea:focus{border-color:#cf8ea3;box-shadow:0 0 0 4px rgba(219,111,138,.10)}
  .input.invalid{border-color:#d86474;background:#fff5f7;box-shadow:0 0 0 4px rgba(216,100,116,.10)}
  .dateField{position:relative}
  .fieldError{display:none;position:absolute;left:0;top:calc(100% + 8px);z-index:20;min-width:170px;max-width:280px;background:#fff;border:1px solid #cfd6df;border-radius:9px;padding:8px 12px 8px 10px;box-shadow:0 10px 24px rgba(48,58,75,.16);font-size:13px;color:#2f3440;font-weight:900;line-height:1.35}
  .fieldError::before{content:"";position:absolute;top:-8px;left:22px;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #cfd6df}
  .fieldError::after{content:"";position:absolute;top:-7px;left:23px;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:7px solid #fff}
  .fieldErrorInner{display:flex;align-items:center;gap:10px}
  .fieldErrorIcon{width:22px;height:22px;border-radius:4px;background:#ff9800;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex:0 0 22px;font-weight:900;line-height:1}
  .fieldErrorText{white-space:nowrap}
  .row1,.row2{display:grid;gap:10px;align-items:center}
  .row1{grid-template-columns:minmax(0,0.95fr) 320px 150px 118px 95px 95px 95px}
  .row2{grid-template-columns:minmax(0,1.15fr) minmax(0,1.15fr) 110px 100px repeat(5,88px)}
  .btn{border:none;border-radius:14px;padding:11px 10px;font-size:14px;font-weight:900;cursor:pointer;white-space:nowrap}
  .btn-add{background:linear-gradient(180deg,#df7992,#cf647f);color:#fff;font-size:16px}
  .btn-clear{background:#f3f5f8;color:#667283;border:1px solid #dce2ea;box-shadow:0 1px 0 rgba(255,255,255,.9)}
  .btn-export{background:#eff8f2;color:#4b7a5d;border:1px solid #d7eadf}
  .btn-import{background:#fff6eb;color:#9a6b28;border:1px solid #f0dfbf}
  .btn-high{background:#ffe9ee;color:#b34d67;border:1px solid #f1c2cf}
  .btn-mid{background:#edf5ff;color:#4d73b3;border:1px solid #c7dafb}
  .btn-wait{background:#f4effc;color:#7753b3;border:1px solid #d7c7ef}
  .chipRow{display:flex;gap:8px;flex-wrap:wrap}
  .tag{border:1px solid var(--tag-border);background:var(--tag);color:#a25d72;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;cursor:pointer}
  .tag.active{background:var(--tag-active);color:#fff;border-color:var(--tag-active)}
  .memoBox{width:100%;height:120px;resize:vertical;border:1px solid #d7dcea;border-radius:16px;padding:12px 14px;font-size:15px;outline:none}
  .memoDualGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .memoPanel{display:flex;flex-direction:column;gap:8px}
  .memoPanelTitle{font-size:15px;font-weight:900;color:#4c5566}
  .boardWrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .col{min-height:520px;border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column}
  .col[data-group="high"]{background:var(--high-bg);border-color:var(--high-bd)}
  .col[data-group="mid"]{background:var(--mid-bg);border-color:var(--mid-bd)}
  .col[data-group="wait"]{background:var(--wait-bg);border-color:var(--wait-bd)}
  .colHead{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:17px;font-weight:900}
  .col[data-group="high"] .colHead{background:var(--high-head)}
  .col[data-group="mid"] .colHead{background:var(--mid-head)}
  .col[data-group="wait"] .colHead{background:var(--wait-head)}
  .count{font-size:12px;font-weight:900;border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:5px 10px;background:rgba(255,255,255,.75)}
  .dropZone{padding:12px;min-height:470px;flex:1}
  .dropZone.over{outline:2px dashed rgba(0,0,0,.16);outline-offset:-6px;border-radius:12px}
  .task{border:1px solid rgba(0,0,0,.08);border-radius:14px;background:#fff;padding:10px 12px;box-shadow:0 4px 10px rgba(0,0,0,.04);margin-bottom:10px;cursor:grab}
  .task.workDraggable{cursor:default}
  .task.done{background:var(--done-bg)}
  .task.dragging{opacity:.55;transform:scale(1.015);box-shadow:0 12px 28px rgba(48,58,75,.18)}
  .task.dropBefore{border-top:4px solid #cf647f;padding-top:8px}
  .dropZone.dropEnd{box-shadow:inset 0 -4px 0 #cf647f}
  .taskTop{display:grid;grid-template-columns:24px 38px minmax(0,1fr) auto;gap:8px;align-items:start}
  .taskCheck{width:24px;height:24px;cursor:pointer;margin-top:1px;accent-color:#cf647f}
  .doneToggle input{width:18px;height:18px;cursor:pointer}
  .taskTitle{font-size:15px;line-height:1.55;word-break:break-word;color:#111;font-weight:900}
  .task.done .taskTitle{color:var(--done-text);text-decoration:line-through}
  .taskMeta{margin-top:6px;margin-left:70px;font-size:13px;line-height:1.6;color:#111;word-break:break-word;font-weight:700}
  .taskMeta .noteText{color:var(--muted);font-weight:500}
  .taskMeta .workNoteText{color:#3d6fd6;font-weight:800}
  .taskMeta .danger{color:var(--danger);font-weight:900}
  .task.done .taskMeta,.task.done .taskMeta .noteText{color:var(--done-text)}
  .taskBtns{display:flex;gap:6px}
  .miniBtn{border:1px solid #d6ddea;background:#fff;color:#5b6471;border-radius:10px;padding:5px 8px;font-size:12px;font-weight:800;cursor:pointer}
  .dragHandle{width:24px;height:28px;border:none;background:transparent;color:#5f6677;line-height:1;cursor:grab;padding:0;display:inline-flex;align-items:center;justify-content:center;user-select:none}
  .dragHandle:active{cursor:grabbing}
  .thinHandle{width:14px;height:12px;display:inline-flex;flex-direction:column;justify-content:space-between;align-items:stretch;opacity:.78}
  .thinHandle i{display:block;height:1.4px;border-radius:999px;background:#5f6677}
  .sortBtn{min-width:30px;padding:5px 7px;background:transparent;color:#3b69a8;border:none}
  .reviewBtn{border:1px solid #e0c57a;background:#fff1b8;color:#7a5600;border-radius:10px;padding:5px 10px;font-size:12px;font-weight:900;cursor:pointer;box-shadow:0 1px 0 rgba(255,255,255,.7)}
  .reviewPendingBtn{border:1px solid #f0d58a;background:#ffe28a;color:#765100;border-radius:10px;padding:5px 10px;font-size:12px;font-weight:900;cursor:not-allowed;opacity:.9}
  .starWrap{display:flex;align-items:center;justify-content:center;margin-top:1px}
  .starIcon{font-size:18px;line-height:1;cursor:pointer;color:#c8c8c8;user-select:none;display:inline-block}
  .starIcon.active{color:#f4bd00}
  .empty{min-height:90px;border:1px dashed rgba(0,0,0,.08);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#8b95a3;background:rgba(255,255,255,.7);font-size:14px}
  .bottomBar{margin-top:10px;display:flex;align-items:center;justify-content:flex-end}
  .doneToggle{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:#5f6677}
  .weekGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:stretch}
  .calendarCard .cardHead{background:linear-gradient(90deg,#eef1df,#e8ecd6);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:11px 16px}
  .day{border:1px solid var(--calendar-bd);border-radius:20px;background:var(--calendar-bg);overflow:hidden;display:flex;flex-direction:column;height:100%;min-height:100%;box-shadow:0 8px 18px rgba(68,78,96,.04)}
  .day.today{background:var(--today);box-shadow:inset 0 0 0 1px rgba(179,142,0,.14)}
  .day.today .dayHead{background:var(--today)}
  .dayHead{padding:4px 16px;font-weight:900;border-bottom:1px solid rgba(0,0,0,.05);line-height:1.1;min-height:38px;background:var(--calendar-head);display:flex;align-items:center;font-size:16px;color:#22324d}
  .dayBody{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0;flex:1}
  .event{border:none;text-align:left;width:100%;border-radius:16px;padding:11px 12px;cursor:pointer;background:#fff;color:#36404f;border:1px solid rgba(76,88,104,.12);line-height:1.45;font-size:13px;word-break:break-word;font-weight:900;box-shadow:0 1px 0 rgba(255,255,255,.9)}
  .event.done{background:var(--done-bg);color:var(--done-text);text-decoration:line-through}
  .event.overdue{color:var(--danger);background:#fbf1f3;border-color:#e8cfd6}
  .event .sub{display:block;margin-top:3px;font-size:12px;opacity:.88;font-weight:700;color:#5d6878}
  .repeatTag{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;background:#f9f1d7;color:#8b6d17;font-size:11px;font-weight:900;border:1px solid #eedca0}
  .autoTag{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;background:#e8f6ff;color:#356b8e;font-size:11px;font-weight:900;border:1px solid #bcdcf2}
  .repeatList{display:grid;gap:10px}
  .repeatItem{border:1px solid #e5e9f0;border-radius:14px;padding:10px 12px;background:#fff}
  .repeatTop{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:start}
  .repeatTitle{font-size:15px;font-weight:900;color:#111;word-break:break-word;cursor:pointer}
  .repeatMeta{margin-top:6px;font-size:13px;color:#596070;line-height:1.6;font-weight:700}
  .repeatBtns{display:flex;gap:6px;align-items:center}
  .softBtn{border:1px solid #d6ddea;background:#fff;color:#5b6471;border-radius:10px;padding:5px 8px;font-size:12px;font-weight:800;cursor:pointer}
  .softBtn.on{background:#eef6ff;border-color:#bfd6fb;color:#3b69a8}
  .foldCard{overflow:hidden}
  .foldHead{cursor:pointer}
  .foldHead .foldArrow{font-size:14px;font-weight:900;color:#5f6677}
  details.foldBox{border:none}
  details.foldBox[open] .foldArrow{transform:rotate(90deg)}
  .foldArrow{display:inline-block;transition:transform .18s ease}
  .calendarTools{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;justify-content:flex-end}
  .modalOverlay{position:fixed;inset:0;background:rgba(33,41,55,.28);display:none;align-items:center;justify-content:center;z-index:2000;padding:18px}
  .modalOverlay.show{display:flex}
  .modalCard{width:min(420px,calc(100vw - 28px));background:#fff;border:1px solid #e6dde3;border-radius:22px;box-shadow:0 20px 50px rgba(43,51,65,.18);padding:18px}
  .modalTitle{font-size:20px;font-weight:900;color:#243247;margin-bottom:8px}
  .modalText{font-size:15px;line-height:1.7;color:#4f5b6c;font-weight:700}
  .modalActions{display:grid;gap:10px;margin-top:16px}
  .modalBtn{border:none;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:900;cursor:pointer}
  .modalBtn.primary{background:linear-gradient(180deg,#df7992,#cf647f);color:#fff}
  .modalBtn.soft{background:#f7fafc;color:#475569;border:1px solid #d9e2ec}
  .modalBtn.warn{background:#fff5e8;color:#8a5a14;border:1px solid #f0d7ad}

  .supabaseCard{
    overflow:hidden;
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    background:var(--card);
  }
  .supabaseHead{
    cursor:pointer;
    background:linear-gradient(90deg,var(--top),var(--top2));
    padding:12px 16px;
    min-height:46px;
    font-size:18px;
    font-weight:900;
    color:var(--text);
    border-bottom:1px solid var(--line);
  }
  .supabaseHead .foldArrow{
    font-size:14px;
    color:#5f6677;
  }
  .supabaseBody{
    padding:12px;
    background:#fff;
  }
  .supabasePanel{
    background:linear-gradient(180deg,#fbfdff,#ffffff);
    border:1px solid #e2e8f0;
    border-radius:18px;
    padding:12px;
  }
  .supabaseTopRow{
    display:grid;
    grid-template-columns:minmax(0,1.05fr) minmax(0,1.15fr) auto auto auto;
    gap:8px;
    align-items:center;
    width:100%;
    padding-bottom:6px;
  }
  .supabaseInputShot{
    height:52px;
    border-radius:16px;
    border:1px solid #d7dcea;
    background:#fff;
    padding:0 16px;
    font-size:16px;
    color:#41546b;
    width:100%;
    min-width:0;
    outline:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
  }
  .supabaseInputShot:focus{
    border-color:#cf8ea3;
    box-shadow:0 0 0 4px rgba(219,111,138,.10);
  }
  #supabaseUrlInput{width:100%}
  #supabaseKeyInput{width:100%}
  .shotBtn{
    height:52px;
    padding:0 16px;
    border-radius:16px;
    border:1px solid #d6ddea;
    background:#fff;
    color:#5a6880;
    font-size:16px;
    font-weight:900;
    white-space:nowrap;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.04);
  }
  .shotBtn.connect{
    background:linear-gradient(180deg,#df7992,#cf647f);
    color:#fff;
    border-color:#cf647f;
  }
  .shotBtn:not(.connect):not(.disconnect){
    background:#f7fafc;
    color:#4b5563;
    border-color:#d8e0ea;
  }
  .shotBtn.disconnect{
    background:#fff5f5;
    color:#da4f4f;
    border-color:#efc6c6;
  }
  .supabaseStatusRow{
    display:flex;
    align-items:center;
    gap:12px;
    padding-top:8px;
    white-space:nowrap;
    overflow-x:auto;
    flex-wrap:wrap;
  }
  .supabaseBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:34px;
    padding:0 16px;
    border-radius:999px;
    background:#e8f7ed;
    color:#2f9d61;
    font-size:14px;
    font-weight:900;
    flex:0 0 auto;
    border:1px solid #cfead9;
  }
  .supabaseMsg{
    color:#6f7c8c;
    font-size:14px;
    font-weight:700;
    flex:0 0 auto;
  }
  .supabaseErr{
    color:#c53e4f;
    font-size:13px;
    font-weight:900;
    flex:1 1 100%;
    white-space:normal;
    line-height:1.5;
    display:none;
  }
  @media (max-width:1100px){
    .supabaseTopRow{
      grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto auto auto;
    }
  }
  @media (max-width:820px){
    .supabaseTopRow{
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    }
  }
  @media (max-width:640px){
    .supabaseTopRow{
      grid-template-columns:1fr;
    }
    .shotBtn{height:46px;padding:0 14px;font-size:15px}
  }
  @media (max-width:1250px){
    .row1{grid-template-columns:minmax(0,0.9fr) 260px 140px 110px 90px 90px 90px}
    .row2{grid-template-columns:minmax(0,1.2fr) 100px 90px repeat(5,82px)}
    .weekGrid{grid-template-columns:repeat(4,1fr)}
  }
  @media (max-width:980px){
    .boardWrap{grid-template-columns:1fr}
    .weekGrid{grid-template-columns:repeat(2,1fr)}
    .row1,.row2,.repeatTop,.supabaseGrid,.supabaseRowLine{grid-template-columns:1fr}
  }
  @media (max-width:640px){
    .page{width:calc(100vw - 14px)}
    .weekGrid,.row1,.row2,.repeatTop,.supabaseGrid,.supabaseRowLine{grid-template-columns:1fr}
    .supabaseLabel{text-align:left}
  }

  body[data-profile="shaowei"]{
    background:linear-gradient(180deg,#f7fbff,#ffffff);
  }
  body[data-profile="shaowei"] .cardHead{
    background:linear-gradient(90deg,#e7f2ff,#dcedff);
  }
  .profileSwitch{display:flex;gap:10px;flex-wrap:wrap}
  .profileBtn{border:none;border-radius:16px;padding:12px 18px;font-size:16px;font-weight:900;cursor:pointer;background:#f3f5f8;color:#5f6677;border:1px solid #dce2ea}
  .profileBtn.active{background:linear-gradient(180deg,#df7992,#cf647f);color:#fff;border-color:#cf647f}
  body[data-profile="shaowei"] .profileBtn.active{background:linear-gradient(180deg,#6da8e8,#4f8fd6);border-color:#4f8fd6}
  .profileModeText{font-size:14px;color:#6a7383;font-weight:800}
  .simpleStats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
  .simpleStat{border:1px solid #dbe5f0;border-radius:16px;background:#f8fbff;padding:10px 12px;text-align:center}
  .simpleStatNum{display:block;font-size:22px;font-weight:900;color:#304862;line-height:1.2}
  .simpleStatLabel{display:block;font-size:13px;font-weight:800;color:#6c7a8b;margin-top:4px}
  .simpleBoardWrap{display:none}
  .simpleCol{background:#f8fbff;border-color:#d7e4f2}
  .simpleCol .colHead{background:#e7f2ff}
  .simpleBoardWrap .dropZone{min-height:300px}
  .hiddenByMode{display:none !important}



  .pageTitleRow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .pageTitleText{font-size:19px;font-weight:900}
  .profileSwitch{display:flex;gap:8px;flex-wrap:wrap}

  .togglePill{height:44px;border-radius:14px;border:1px solid #d6ddea;background:#f7fafc;color:#4b5563;font-size:14px;font-weight:900;cursor:pointer;padding:0 14px}
  .togglePill.active{background:#fff1f3;border-color:#efc6d0;color:#b34d67}
  .togglePill.work{background:#eef6ff;border-color:#c9ddfb;color:#3b69a8}
  .togglePill.work.active{background:#dbeaff;border-color:#b5cff7;color:#2f5b97}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:900;border:1px solid #d7dce7;background:#f5f7fb;color:#586272}
  .badge.handoff{background:#fff1f3;border-color:#efc6d0;color:#b34d67}
  .badge.common{background:#f3f5ff;border-color:#d9def8;color:#5061a8}
  .badge.today{background:#fff0a8;border-color:#efd36f;color:#7a5b00;box-shadow:0 1px 0 rgba(255,255,255,.75)}

  .flatpickr-input[readonly]{background:#fff;cursor:pointer}

  .sharedMemoBox{height:150px;background:#fffdf8;border-color:#ead9b5}
  .sortBtn{min-width:42px;background:#fff8e8;color:#8a5a14;border-color:#edd3a2}
  body[data-profile="shaowei"] .sortBtn{min-width:48px}
  @media (max-width:1250px){
    .row2{grid-template-columns:minmax(0,1.1fr) minmax(0,1.1fr) 110px 100px repeat(5,82px)}
  }
  @media (max-width:980px){
    .memoDualGrid{grid-template-columns:1fr}
  }

  /* 只有手機維持桌機固定版面；電腦維持正常滿版，不要左右滑動 */
  @media (max-width: 900px){
    html,body{min-width:1720px;overflow-x:auto;overflow-y:auto;}
    .page{width:1680px !important;min-width:1680px !important;margin:12px !important;}
    .memoDualGrid{grid-template-columns:1fr 1fr !important;}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(() => {
  const STORAGE_KEY = 'todo_v22_dual_profiles';
  const LEGACY_TASKS_KEY = 'todo_v13_repeat_manager';
  const LEGACY_MEMO_KEY = 'todo_v13_repeat_manager_memo';
  const LEGACY_TODO_NOTE_KEY = 'todo_v13_todo_note';
  const SUPABASE_KEY = 'todo_v22_dual_profiles_supabase_settings';
  const SUPABASE_TABLE = 'todo_app_state';
  const PROFILE_LABELS = { lihui: '麗卉', shaowei: '紹薇' };
  const DEFAULT_PROFILE = 'lihui';
  const LEGACY_KEYS = ['todo_v13_repeat_manager','todo_v12_single_star','todo_v11_multistar_tagfix','todo_v10_star_front_click_edit_fixed','todo_v9_final','todo_v8_complete','todo_v7_full','todo_v6','todo_calendar_full_layout_v2'];

  const els = {
    titleInput: document.getElementById('titleInput'),
    assigneeInput: document.getElementById('assigneeInput'),
    dateInput: document.getElementById('dateInput'),
    noteInput: document.getElementById('noteInput'),
    progressInput: document.getElementById('progressInput'),
    repeatTypeInput: document.getElementById('repeatTypeInput'),
    repeatEveryInput: document.getElementById('repeatEveryInput'),
    saveBtn: document.getElementById('saveBtn'),
    clearBtn: document.getElementById('clearBtn'),
    exportBtn: document.getElementById('exportBtn'),
    importBtn: document.getElementById('importBtn'),
    importFile: document.getElementById('importFile'),
    clockBox: document.getElementById('clockBox'),
    memoBox: document.getElementById('memoBox'),
    memoMainTitle: document.getElementById('memoMainTitle'),
    handoffMemoTitle: document.getElementById('handoffMemoTitle'),
    handoffMemoBox: document.getElementById('handoffMemoBox'),
    sharedMemoBox: document.getElementById('sharedMemoBox'),
    assigneeTags: document.getElementById('assigneeTags'),
    repeatList: document.getElementById('repeatList'),
    boardWrap: document.getElementById('boardWrap'),
    simpleBoardWrap: document.getElementById('simpleBoardWrap'),
    simpleStats: document.getElementById('simpleStats'),
    taskListStatusText: document.getElementById('taskListStatusText'),
    taskInputTitle: document.getElementById('taskInputTitle'),
    saveStatusRow: document.getElementById('saveStatusRow'),
    todoNoteWrap: document.getElementById('todoNoteWrap'),
    repeatSettingsCard: document.getElementById('repeatSettingsCard'),
    profileModeText: document.getElementById('profileModeText'),
    calendarCard: document.querySelector('.calendarCard'),
    calendarStatus: document.getElementById('calendarStatus'),
    lihuiAssignBtn: document.getElementById('lihuiAssignBtn'),
    commonTaskBtn: document.getElementById('commonTaskBtn'),
    workTaskBtn: document.getElementById('workTaskBtn'),
    switchLihui: document.getElementById('switchLihui'),
    switchShaowei: document.getElementById('switchShaowei'),
    zoneHigh: document.getElementById('zoneHigh'),
    zoneMid: document.getElementById('zoneMid'),
    zoneWait: document.getElementById('zoneWait'),
    zoneSimple: document.getElementById('zoneSimple'),
    countHigh: document.getElementById('countHigh'),
    listTitleHigh: document.getElementById('listTitleHigh'),
    listTitleMid: document.getElementById('listTitleMid'),
    listTitleWait: document.getElementById('listTitleWait'),
    countMid: document.getElementById('countMid'),
    countWait: document.getElementById('countWait'),
    countSimple: document.getElementById('countSimple'),
    toggleDone: document.getElementById('toggleDone'),
    prevWeekBtn: document.getElementById('prevWeekBtn'),
    thisWeekBtn: document.getElementById('thisWeekBtn'),
    nextWeekBtn: document.getElementById('nextWeekBtn'),
    weekGrid: document.getElementById('weekGrid'),
    saveStatus: document.getElementById('saveStatus'),
    supabaseUrlInput: document.getElementById('supabaseUrlInput'),
    supabaseKeyInput: document.getElementById('supabaseKeyInput'),
    supabaseStatusBadge: document.getElementById('supabaseStatusBadge'),
    supabaseStatusText: document.getElementById('supabaseStatusText'),
    supabaseLastSync: document.getElementById('supabaseLastSync'),
    supabaseErrorDetail: document.getElementById('supabaseErrorDetail'),
    btnConnect: document.getElementById('btnConnect'),
    btnSync: document.getElementById('btnSync'),
    btnDisconnect: document.getElementById('btnDisconnect'),
    dateError: document.getElementById('dateError'),
    addHighBtn: document.getElementById('addHighBtn'),
    addMidBtn: document.getElementById('addMidBtn'),
    addWaitBtn: document.getElementById('addWaitBtn'),
    addCalendarBtn: document.getElementById('addCalendarBtn'),
    recurringModal: document.getElementById('recurringModal'),
    recurringModalText: document.getElementById('recurringModalText'),
    modalCompleteOccurrenceBtn: document.getElementById('modalCompleteOccurrenceBtn'),
    modalEditOccurrenceBtn: document.getElementById('modalEditOccurrenceBtn'),
    modalEditSeriesBtn: document.getElementById('modalEditSeriesBtn'),
    modalCloseBtn: document.getElementById('modalCloseBtn'),
    singleTaskModal: document.getElementById('singleTaskModal'),
    singleTaskModalText: document.getElementById('singleTaskModalText'),
    modalEditSingleTaskBtn: document.getElementById('modalEditSingleTaskBtn'),
    modalCompleteSingleTaskBtn: document.getElementById('modalCompleteSingleTaskBtn'),
    modalCompleteNextSingleTaskBtn: document.getElementById('modalCompleteNextSingleTaskBtn'),
    modalCloseSingleTaskBtn: document.getElementById('modalCloseSingleTaskBtn')
  };

  const weekMap = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  let editingId = '';
  let currentWeekStart = getWeekStart(new Date());
  let currentFilterUser = '';
  let showDone = false;
  let dragId = '';
  let dragSource = 'profile';
  let appState = null;
  let currentProfile = DEFAULT_PROFILE;
  let state = { tasks: [], memo: '', todoNote: '' };
  let supabaseClient = null;
  let remoteSaveTimer = null;
  let remotePollTimer = null;
  let remoteChannel = null;
  let remoteLoadFinished = false;
  let syncEnabled = false;
  let lastRemoteUpdatedAt = '';
  let isApplyingRemote = false;
  let occurrenceEditContext = null;
  let sharedState = { tasks: [] };
  let editingSharedId = '';
  let lastSharedRemoteUpdatedAt = '';
  let lastSupabaseErrorDetail = '';
  let mainDatePicker = null;


  function blankProfileState(){ return { tasks: [], memo: '', handoffMemo: '', todoNote: '' }; }
  function blankSharedState(){ return { tasks: [], sharedMemo: '' }; }
  function currentProfileName(){ return PROFILE_LABELS[currentProfile] || PROFILE_LABELS[DEFAULT_PROFILE]; }
  function profileLabel(key){ return PROFILE_LABELS[key] || ''; }
  function otherProfile(key){ return key === 'shaowei' ? 'lihui' : 'shaowei'; }
  function isLihui(){ return currentProfile === 'lihui'; }
  function isHandoffTask(task, source = 'profile'){ return source === 'shared' && !!(task && task.lihuiAssign); }
  function sharedExpectedReviewer(task){
    if(!task) return '';
    if(isHandoffTask(task, 'shared')) return 'lihui';
    return otherProfile(task.sharedCompleteBy || currentProfile);
  }
  function isSharedPendingReview(task){ return !!(task && task.sharedCompleteBy && !task.sharedReviewedBy && !task.done); }
  function sharedCompletionMetaText(task){
    if(!task || !task.sharedCompleteBy) return '';
    const doneBy = profileLabel(task.sharedCompleteBy);
    const viewer = profileLabel(task.sharedReviewedBy || sharedExpectedReviewer(task));
    return `${doneBy}已完成-等${viewer}閱`;
  }
  function canCurrentProfileActOnTask(task, source = 'profile'){
    if(source === 'shared' && isHandoffTask(task, source) && !isSharedPendingReview(task) && !task.done){
      return currentProfile === 'shaowei';
    }
    return true;
  }
  function isShaowei(){ return currentProfile === 'shaowei'; }
  function isCommonFormActive(){ return !!(els.commonTaskBtn && els.commonTaskBtn.dataset.active === '1'); }
  function setCommonFormActive(active){
    if(!els.commonTaskBtn) return;
    els.commonTaskBtn.dataset.active = active ? '1' : '0';
    els.commonTaskBtn.classList.toggle('active', !!active);
    els.commonTaskBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
  }
  function getTaskBySource(source, id){
    const list = source === 'shared' ? sharedState.tasks : state.tasks;
    return list.find(x => x.id === id) || null;
  }
  function getTaskListBySource(source){
    return source === 'shared' ? sharedState.tasks : state.tasks;
  }
  function nextOrderBySource(source, group = 'mid'){
    const list = getTaskListBySource(source);
    const orders = list.filter(t => t.group === group).map(t => orderVal(t.order));
    return orders.length ? Math.max(...orders) + 1 : 1;
  }
  function persistBySource(source, options = {}){
    if(source === 'shared') persistShared(options);
    else persist();
  }
  function removeTaskBySource(source, id){
    if(source === 'shared'){
      sharedState.tasks = sharedState.tasks.filter(x => x.id !== id && x.autoSpawnedFrom !== id);
      appState.shared = sharedState;
    }else{
      state.tasks = state.tasks.filter(x => x.id !== id && x.autoSpawnedFrom !== id);
      appState.profiles[currentProfile] = state;
    }
  }
  function getHandoffMemoBox(){ return document.getElementById('handoffMemoBox'); }
  function getProfileTodoNoteBox(){ return document.getElementById('todoNoteBox'); }
  function getSharedMemoBox(){ return document.getElementById('sharedMemoBox'); }
  function ensureProfileContainer(){
    if(!appState || typeof appState !== 'object') appState = { activeProfile: DEFAULT_PROFILE, profiles: {}, shared: blankSharedState() };
    if(!appState.profiles || typeof appState.profiles !== 'object') appState.profiles = {};
    if(!appState.profiles.lihui) appState.profiles.lihui = blankProfileState();
    if(!appState.profiles.shaowei) appState.profiles.shaowei = blankProfileState();
    if(!appState.shared || typeof appState.shared !== 'object') appState.shared = blankSharedState();
  }
  function normalizeProfileState(data){
    const base = blankProfileState();
    if(data && Array.isArray(data.tasks)) base.tasks = repairRecurringTaskDates(data.tasks.map(normalizeLegacyTask).filter(t => t.title));
    base.memo = String(data && data.memo || '');
    base.handoffMemo = String(data && (data.handoffMemo ?? data.todoNote) || '');
    base.todoNote = String(data && (data.todoNoteBox ?? data.boardNote ?? '') || '');
    return base;
  }
  function normalizeSharedState(data){
    const base = blankSharedState();
    if(data && Array.isArray(data.tasks)) base.tasks = repairRecurringTaskDates(data.tasks.map(normalizeLegacyTask).filter(t => t.title));
    base.sharedMemo = String(data && (data.sharedMemo ?? data.memo ?? '') || '');
    return base;
  }
  function bindStateFromProfile(){
    ensureProfileContainer();
    state = normalizeProfileState(appState.profiles[currentProfile]);
    appState.profiles[currentProfile] = state;
    sharedState = normalizeSharedState(appState.shared);
    appState.shared = sharedState;
  }
  function saveAppStateLocally(){
    ensureProfileContainer();
    const sharedMemoBox = getSharedMemoBox();
    if(sharedMemoBox && sharedState) sharedState.sharedMemo = sharedMemoBox.value || '';
    appState.activeProfile = currentProfile;
    appState.profiles[currentProfile] = state;
    appState.shared = sharedState;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
  }
  function loadLegacyTasks(){
    for (const key of LEGACY_KEYS){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) continue;
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed)) return {tasks: parsed.map(normalizeLegacyTask).filter(t => t.title)};
        if(parsed && Array.isArray(parsed.tasks)) return {tasks: parsed.tasks.map(normalizeLegacyTask).filter(t => t.title)};
      }catch(e){}
    }
    return {tasks: []};
  }
  function loadAppState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && parsed.profiles){
          appState = {
            activeProfile: parsed.activeProfile === 'shaowei' ? 'shaowei' : DEFAULT_PROFILE,
            profiles: {
              lihui: normalizeProfileState(parsed.profiles.lihui),
              shaowei: normalizeProfileState(parsed.profiles.shaowei)
            },
            shared: normalizeSharedState(parsed.shared)
          };
          return appState;
        }
      }
    }catch(e){}
    const legacy = loadLegacyTasks();
    appState = {
      activeProfile: DEFAULT_PROFILE,
      profiles: {
        lihui: normalizeProfileState({
          tasks: legacy.tasks,
          memo: localStorage.getItem(LEGACY_MEMO_KEY) || '',
          todoNoteBox: localStorage.getItem(LEGACY_TODO_NOTE_KEY) || ''
        }),
        shaowei: blankProfileState()

  function normalizeFlexibleDate(text){
    const s = String(text || '').trim();
    if(!s) return '';
    let m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})$/);
    if(m){
      const now = new Date();
      const y = now.getFullYear() - 1911;
      const mm = parseInt(m[1], 10), dd = parseInt(m[2], 10);
      if(mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) return `${y}/${mm}/${dd}`;
      return s;
    }
    m = s.match(/^(\d{1,4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
    if(m){
      let y = parseInt(m[1], 10);
      const mm = parseInt(m[2], 10), dd = parseInt(m[3], 10);
      if(mm < 1 || mm > 12 || dd < 1 || dd > 31) return s;
      if(y > 1911) y = y - 1911;
      return `${y}/${mm}/${dd}`;
    }
    return s;
  }

  function rocToIso(text){
    const s = String(text || '').trim();
    if(!s) return '';
    const m = s.match(/^(\d{1,4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
    if(!m) return '';
    let y = parseInt(m[1], 10), mm = parseInt(m[2], 10), dd = parseInt(m[3], 10);
    if(y < 1911) y += 1911;
    if(mm < 1 || mm > 12 || dd < 1 || dd > 31) return '';
    const d = new Date(y, mm - 1, dd);
    if(d.getFullYear() !== y || d.getMonth() !== mm - 1 || d.getDate() !== dd) return '';
    return `${y}-${pad(mm)}-${pad(dd)}`;
  }

  function repairRecurringTaskDates(tasks){

    list.forEach(task => {

          .filter(x => x.autoSpawnedFrom === task.id)

  function computeOccurrencesForSingleDay(task, dayKey){
    const target = toDate(dayKey);
    const base = toDate(task.dueDate);
    if(target < base) return false;
    if(task.repeatType === 'weekly'){
      const diff = Math.floor((target - base)/86400000);
      return diff % 7 === 0;
    }else if(task.repeatType === 'monthly'){
      return base.getDate() === target.getDate();
    }else if(task.repeatType === 'every_x_days' && task.repeatEvery > 0){
      const diff = Math.floor((target - base)/86400000);
      return diff >= 0 && diff % task.repeatEvery === 0;
    }
    return false;
  }

  function getLatestOccurrenceOnOrBefore(task, dayKey){
    if(!task || !task.repeatType || !task.dueDate) return '';
    const target = toDate(dayKey);
    const base = toDate(task.dueDate);
    if(target < base) return '';

    if(task.repeatType === 'weekly'){
      const diff = Math.floor((target - base) / 86400000);
      const steps = Math.floor(diff / 7);
      return dateKey(addDays(base, steps * 7));
    }

    if(task.repeatType === 'every_x_days' && task.repeatEvery > 0){
      const diff = Math.floor((target - base) / 86400000);
      const steps = Math.floor(diff / task.repeatEvery);
      return dateKey(addDays(base, steps * task.repeatEvery));
    }

    if(task.repeatType === 'monthly'){
      let candidate = new Date(base);
      while(true){
        const next = new Date(candidate);
        next.setMonth(next.getMonth() + 1);
        if(next > target) break;
        candidate = next;
      }
      return dateKey(candidate);
    }

    return '';
  }

    const sameGroup = list.filter(x => x.group === group).map(x => orderVal(x.order));
    const next = sameGroup.length ? Math.max(...sameGroup) + 1 : 1;
    const instance = {
      id: uid(),
      title: masterTask.title,
      dueDate: occurrenceDate,
      assignee: masterTask.assignee,
      note: masterTask.note,
      progress: masterTask.progress,
      lihuiAssign: !!masterTask.lihuiAssign,
      repeatType: '',
      repeatEvery: 0,
      calendarOnly: false,
      group,
      done: false,
      order: next,
      createdAt: new Date().toISOString(),
      autoSpawnedFrom: masterTask.id,
      sourceId: masterTask.id,
      occurrenceOriginalDate: occurrenceDate,
      generatedDates: [],
      isStarred: false,
      repeatEnabled: true
    };
    list.push(instance);
    return instance;

  function ensureOccurrenceInstance(masterId, occurrenceDate){

    const masterTask = state.tasks.find(x => x.id === masterId);

  function ensureRecurringTasksForList(list, options = {}){
    const referenceKey = options.referenceKey || todayStr();
    const triggerMode = options.triggerMode || 'today';
    const groupName = options.groupName || (isShaowei() ? 'simple' : 'high');
    let changed = false;

    list.forEach(t => {
      if(t.done || !t.repeatEnabled || !t.repeatType || !t.dueDate || t.autoSpawnedFrom) return;
      const relevantOccurrence = getLatestOccurrenceOnOrBefore(t, referenceKey);
      if(!relevantOccurrence) return;
      const triggerDate = triggerMode === 'day_before' ? addDays(toDate(relevantOccurrence), -1) : toDate(relevantOccurrence);
      if(today() < triggerDate) return;
      const exists = list.some(x => x.autoSpawnedFrom === t.id && (x.occurrenceOriginalDate || x.dueDate) === relevantOccurrence);
      if(!exists){
        createOccurrenceInstanceInList(list, t, relevantOccurrence, groupName);
        changed = true;
      }
    });

    return changed;
  }

  function ensureRecurringTasksForToday(){
    const lihuiRecurringListGroup = isLihui() ? 'high' : 'wait';
    const profileChanged = ensureRecurringTasksForList(state.tasks, {
      referenceKey: dateKey(addDays(today(), 1)),
      triggerMode: 'day_before',
      groupName: lihuiRecurringListGroup
    });
    const sharedChanged = ensureRecurringTasksForList(sharedState.tasks, {
      referenceKey: dateKey(addDays(today(), 1)),
      triggerMode: 'day_before',
      groupName: lihuiRecurringListGroup
    });
    if(profileChanged) persist();
    if(sharedChanged) persistShared({ statusText: '已儲存' });
  }

  function setOccurrenceEditMode(context = null){
    const referenceKey = isShaowei() ? todayStr() : dateKey(addDays(today(), 1));
    let changed = false;

    state.tasks.forEach(t => {
      if(t.done || !t.repeatEnabled || !t.repeatType || !t.dueDate || t.autoSpawnedFrom) return;

      const relevantOccurrence = getLatestOccurrenceOnOrBefore(t, referenceKey);
      if(!relevantOccurrence) return;

      const triggerDate = isShaowei() ? toDate(relevantOccurrence) : addDays(toDate(relevantOccurrence), -1);
      if(today() < triggerDate) return;

      const exists = state.tasks.some(x => x.autoSpawnedFrom === t.id && (x.occurrenceOriginalDate || x.dueDate) === relevantOccurrence);
      if(!exists){
        createOccurrenceInstance(t, relevantOccurrence);
        changed = true;
      }
    });

    if(changed) persist();
  }

  function setOccurrenceEditMode(context = null){

    occurrenceEditContext = context;
    const locked = !!context;
    els.dateInput.disabled = locked;
    els.repeatTypeInput.disabled = locked;
    els.repeatEveryInput.disabled = locked;
    if(locked){
      els.saveBtn.textContent = '更新本次';
    }
  }


  function clearForm(){
    editingId = '';
    editingSharedId = '';
    setOccurrenceEditMode(null);
    els.titleInput.value = '';
    if(els.assigneeInput) els.assigneeInput.value = '';
    els.dateInput.value = '';
    lastSelectedDate = '';
    if(els.noteInput) els.noteInput.value = '';
    if(els.progressInput) els.progressInput.value = '';
    if(els.lihuiAssignBtn){
      els.lihuiAssignBtn.dataset.active = '0';
      els.lihuiAssignBtn.classList.remove('active');
      els.lihuiAssignBtn.setAttribute('aria-pressed','false');
    }
    if(els.workTaskBtn){
      els.workTaskBtn.dataset.active = '0';
      els.workTaskBtn.classList.remove('active');
      els.workTaskBtn.setAttribute('aria-pressed','false');
    }
    setCommonFormActive(false);
    els.repeatTypeInput.value = '';
    els.repeatEveryInput.value = '';
    els.saveBtn.textContent = '新增';
    setDateError('');
    els.titleInput.focus();
  }

  function populateForm(task, options = {}){
    const source = options.source || task._source || 'profile';
    editingId = source === 'shared' ? '' : task.id;
    editingSharedId = source === 'shared' ? task.id : '';
    setOccurrenceEditMode(options.occurrenceContext || null);
    els.titleInput.value = task.title || '';
    if(els.assigneeInput) els.assigneeInput.value = task.assignee || '';
    els.dateInput.value = task.dueDate || '';
    lastSelectedDate = els.dateInput.value || '';
    if(els.noteInput) els.noteInput.value = task.note || '';
    if(els.progressInput) els.progressInput.value = task.progress || '';
    if(els.lihuiAssignBtn){
      const active = !!task.lihuiAssign;
      els.lihuiAssignBtn.dataset.active = active ? '1' : '0';
      els.lihuiAssignBtn.classList.toggle('active', active);
      els.lihuiAssignBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
    }
    if(els.workTaskBtn){
      const active = task.taskCategory === 'work';
      els.workTaskBtn.dataset.active = active ? '1' : '0';
      els.workTaskBtn.classList.toggle('active', active);
      els.workTaskBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
    }
    setCommonFormActive(source === 'shared');
    els.repeatTypeInput.value = task.repeatType || '';
    els.repeatEveryInput.value = task.repeatEvery || '';
    if(!occurrenceEditContext) els.saveBtn.textContent = '更新';
    const inputSection = document.getElementById('taskInputSection');
    if(inputSection){
      inputSection.scrollIntoView({behavior:'smooth', block:'start'});
    }else{
      window.scrollTo({top:0, behavior:'smooth'});
    }
    setTimeout(() => els.titleInput.focus(), 250);
  }

  function saveTask(group, calendarOnlyMode = null, extra = {}){
    const title = els.titleInput.value.trim();
    if(!title){ alert('請先輸入事項'); els.titleInput.focus(); return; }
    const rawDate = String(els.dateInput.value || '').trim();
    const sourceSource = editingSharedId ? 'shared' : (editingId ? 'profile' : '');
    const editingTask = sourceSource ? getTaskBySource(sourceSource, editingId || editingSharedId) : null;
    const fallbackDate = lastSelectedDate
      ? (rocToIso(normalizeFlexibleDate(lastSelectedDate)) || lastSelectedDate)
      : (editingTask && editingTask.dueDate ? editingTask.dueDate : '');
    let dueDate = occurrenceEditContext ? occurrenceEditContext.date : validateDateInput();
    if(!dueDate && !rawDate && fallbackDate){
      dueDate = fallbackDate;
      els.dateInput.value = fallbackDate;
      lastSelectedDate = fallbackDate;
      setDateError('');
    }
    if(!occurrenceEditContext && rawDate && !dueDate){
      els.dateInput.focus();
      return;
    }
    const assignee = els.assigneeInput ? els.assigneeInput.value.trim().replace(/^@/,'') : '';
    const note = els.noteInput ? els.noteInput.value.trim() : '';
    const lihuiAssign = !!(els.lihuiAssignBtn && els.lihuiAssignBtn.dataset.active === '1');
    const commonActive = extra.forceCommon ? true : isCommonFormActive();
    const workActive = !!(extra.taskCategory === 'work' || (els.workTaskBtn && els.workTaskBtn.dataset.active === '1'));
    const repeatType = occurrenceEditContext ? '' : els.repeatTypeInput.value;
    let repeatEvery = occurrenceEditContext ? 0 : Number(els.repeatEveryInput.value || 0);
    if(repeatType !== 'every_x_days') repeatEvery = 0;

    if(!occurrenceEditContext && repeatType === 'every_x_days' && repeatEvery <= 0){
      alert('幾天請輸入 1 以上');
      els.repeatEveryInput.focus();
      return;
    }
    if(!occurrenceEditContext && repeatType && !dueDate){
      alert('重複任務請先選日期');
      els.dateInput.focus();
      return;
    }

    const targetSource = (commonActive || lihuiAssign) ? 'shared' : 'profile';
    const targetList = targetSource === 'shared' ? sharedState.tasks : state.tasks;
    const taskCategory = workActive ? 'work' : 'todo';
    const defaultProfileGroup = 'high';
    const defaultSharedGroup = 'high';
    const preservedGroup = editingTask ? (editingTask.group || (targetSource === 'shared' ? defaultSharedGroup : defaultProfileGroup)) : '';
    const targetGroup = targetSource === 'shared'
      ? (taskCategory === 'work' ? 'mid' : (group || preservedGroup || defaultSharedGroup))
      : (taskCategory === 'work' ? 'mid' : (group || preservedGroup || defaultProfileGroup));
    const nextOrderValue = () => {
      const orders = targetList.filter(x => x.group === targetGroup).map(x => orderVal(x.order));
      return orders.length ? Math.max(...orders) + 1 : 1;
    };
    const payload = {
      title, assignee, dueDate, note, lihuiAssign,
      repeatType, repeatEvery, calendarOnly: !!calendarOnlyMode, group: targetGroup, done: false,
      occurrenceOriginalDate: dueDate || (editingTask && (editingTask.occurrenceOriginalDate || editingTask.dueDate) || ''), repeatEnabled: true, taskCategory
    };

    if(sourceSource === targetSource && (editingId || editingSharedId)){
      const t = getTaskBySource(targetSource, editingId || editingSharedId);
      if(!t) return;
      Object.assign(t, payload);
      t.done = t.done;
      if(occurrenceEditContext){
        t.dueDate = occurrenceEditContext.date;
        t.occurrenceOriginalDate = occurrenceEditContext.date;
        t.calendarOnly = false;
        t.group = targetGroup;
      }
      if(targetSource === 'shared') persistShared({ statusText: '共同任務已儲存' }); else persist();
      ensureRecurringTasksForToday();
      clearForm();
      renderAll();
      return;
    }

    if(sourceSource && sourceSource !== targetSource){
      const original = getTaskBySource(sourceSource, editingId || editingSharedId);
      if(!original) return;
      const moved = Object.assign({}, original, payload, { group: targetGroup, order: nextOrderValue() });
      removeTaskBySource(sourceSource, original.id);
      targetList.push(moved);
      if(sourceSource === 'shared' || targetSource === 'shared') persistShared({ statusText: '共同任務已儲存' });
      if(sourceSource === 'profile' || targetSource === 'profile') persist();
      ensureRecurringTasksForToday();
      clearForm();
      renderAll();
      return;
    }

    targetList.push({
      id: uid(),
      order: nextOrderValue(),
      createdAt: new Date().toISOString(),
      autoSpawnedFrom: '', sourceId: '', generatedDates: [], isStarred: false,
      ...payload
    });
    if(targetSource === 'shared') persistShared({ statusText: '共同任務已儲存' }); else persist();
    ensureRecurringTasksForToday();
    clearForm();
    renderAll();
  }

  function moveTaskToTop(id, shouldRender = true, source = 'profile'){

    const list = source === 'shared' ? sharedState.tasks : state.tasks;
    const t = list.find(x => x.id === id);
    if(!t) return;
    const sameGroup = list
      .filter(x => x.group === t.group && x.id !== id)
      .sort((a,b) => {
        if((!!b.isStarred) !== (!!a.isStarred)) return Number(!!b.isStarred) - Number(!!a.isStarred);
        return orderVal(a.order) - orderVal(b.order);
      });
    t.order = 1;
    sameGroup.forEach((item, idx) => item.order = idx + 2);
    if(shouldRender){
      if(source === 'shared') persistShared({ statusText: '共同任務已儲存' }); else persist();
      renderAll();
    }
  }

  function toggleStar(id, source = 'profile'){
    const t = getTaskBySource(source, id);
    if(!t) return;
    t.isStarred = !t.isStarred;
    if(t.isStarred) moveTaskToTop(id, false, source);
    if(source === 'shared') persistShared({ statusText: '共同任務已儲存' }); else persist();
    renderAll();
  }

  function toggleRepeatEnabled(id, source = 'profile'){
    const t = getTaskBySource(source, id);
    if(!t) return;
    t.repeatEnabled = !t.repeatEnabled;
    if(source === 'shared') persistShared({ statusText: '共同任務已儲存' }); else persist();
    renderAll();
  }

  function deleteTask(id, source = 'profile'){
    const t = getTaskBySource(source, id);
    if(!t) return;
    if(!confirm(`確定刪除「${t.title}」？`)) return;
    removeTaskBySource(source, id);
    if(source === 'shared'){
      if(editingSharedId === id) clearForm();
      persistShared({ statusText: '共同任務已刪除' });
    }else{
      if(currentFilterUser && !state.tasks.some(x => visibleBaseTask(x, 'profile') && splitAssignees(x.assignee).includes(currentFilterUser))) currentFilterUser = '';
      if(editingId === id) clearForm();
      persist();
    }
    renderAll();
  }

  function toggleDone(id, source = 'profile'){
    const t = getTaskBySource(source, id);
    if(!t) return;
    if(isShaowei() && t.taskCategory === 'work') return;
    if(source === 'shared'){
      if(t.done){
        t.done = false;
        t.sharedCompleteBy = '';
        t.sharedReviewedBy = '';
        persistShared({ statusText: '共同任務已儲存' });
        renderAll();
        return;
      }
      if(isSharedPendingReview(t)){
        const expectedReviewer = sharedExpectedReviewer(t);
        if(currentProfile === t.sharedCompleteBy){
          alert(`已完成，待${profileLabel(expectedReviewer)}點閱。`);
          return;
        }
        if(expectedReviewer && currentProfile !== expectedReviewer){
          alert(`這筆任務需由${profileLabel(expectedReviewer)}點閱。`);
          return;
        }
        t.sharedReviewedBy = currentProfile;
        t.done = true;
        persistShared({ statusText: '共同任務已儲存' });
        renderAll();
        return;
      }
      if(isHandoffTask(t, source) && currentProfile !== 'shaowei'){
        alert('這筆麗卉交辦需由紹薇先完成，再由麗卉點閱。');
        return;
      }
      t.sharedCompleteBy = currentProfile;
      t.sharedReviewedBy = '';
      persistShared({ statusText: '共同任務已儲存' });
      renderAll();
      return;
    }
    if(!t.done){
      if(advanceShaoweiRecurringTask(t, source)){
        renderAll();
        return;
      }
      if(completeRecurringAndQueueNext(t, source)){
        renderAll();
        return;
      }
      const nextResult = maybeCompleteWithNextDate(t, source);
      if(nextResult !== 'not_applicable'){
        if(nextResult !== 'cancelled') renderAll();
        return;
      }
    }
    t.done = !t.done;
    if(source === 'shared') persistShared({ statusText: '共同任務已儲存' });
    else{
      if(currentFilterUser && !state.tasks.some(x => visibleBaseTask(x, 'profile') && splitAssignees(x.assignee).includes(currentFilterUser))) currentFilterUser = '';
      persist();
    }
    renderAll();
  }

  function visibleBaseTask(task, source = 'profile'){
    if(!(showDone || !task.done)) return false;

    if(isShaowei()){
      if(task.autoSpawnedFrom) return false;
      if(task.repeatType) return true;
    }

    if(task.repeatType) return false;

    if(task.autoSpawnedFrom){
      // 麗卉不吃 showImmediately：完成本次後不能馬上顯示下一次，要等到下次前一天。
      // 紹薇維持原規則，循環任務固定留在清單。
      if(isShaowei() && task.showImmediately) return true;
      if(!task.dueDate) return true;
      const triggerDate = isShaowei() ? toDate(task.dueDate) : addDays(toDate(task.dueDate), -1);
      return today() >= triggerDate;
    }

    if(task.calendarOnly && task.dueDate){
      const due = toDate(task.dueDate);
      const triggerDate = isShaowei() ? due : addDays(due, -1);
      return today() >= triggerDate;
    }

    return true;
  }


  function taskHtml(task){
    const source = task._source || 'profile';
    const isShared = source === 'shared';
    const allowCheck = !(isShaowei() && task.taskCategory === 'work') && canCurrentProfileActOnTask(task, source);
    const sharedPendingReview = isShared && isSharedPendingReview(task);
    const sharedReviewPendingForMe = sharedPendingReview && currentProfile !== task.sharedCompleteBy;
    const sharedReviewWaitingForOther = sharedPendingReview && currentProfile === task.sharedCompleteBy;
    const visualDone = allowCheck && !!task.done;
    const meta = [];
    if(task.dueDate){
      const dueText = `<span class="${isOverdue(task) ? 'danger' : ''}">${escapeHtml(fmtROC(task.dueDate))}${isOverdue(task) ? '｜已過期' : ''}</span>`;
      if(task.dueDate === todayStr()) meta.push(`${dueText} <span class="badge today">今天</span>`);
      else meta.push(dueText);
    }
    if(task.assignee) meta.push(escapeHtml('@' + task.assignee));
    if(task.lihuiAssign) meta.push(`<span class="badge handoff">麗卉交辦</span>`);
    else if(isShared) meta.push(`<span class="badge common">共同</span>`);
    if(isShared && task.sharedCompleteBy) meta.push(`<span class="autoTag">${escapeHtml(sharedCompletionMetaText(task))}</span>`);
    const noteClass = (isLihui() || (isShaowei() && task.taskCategory === 'work')) ? 'workNoteText' : 'noteText';
    if(task.note) meta.push(`<span class="${noteClass}">${escapeHtml(task.note)}</span>`);
    if(task.repeatType) meta.push(`<span class="repeatTag">${escapeHtml(repeatBadgeText(task))}</span>`);
    if(task.autoSpawnedFrom) meta.push(`<span class="autoTag">循環事件</span>`);
    const isShaoweiWork = isShaowei() && task.taskCategory === 'work';
    const starred = !!task.isStarred;
    const allowStar = true;
    const starHtml = `<span class="starIcon ${starred ? 'active' : ''}" data-act="star" data-id="${task.id}" data-source="${source}" title="星星填滿會排序到最前面">${starred ? '★' : '☆'}</span>`;
    const firstCol = isShaoweiWork
      ? `<button class="dragHandle" data-drag-handle="work" draggable="true" data-id="${task.id}" data-source="${source}" type="button" title="按住拖曳排序"><span class="thinHandle" aria-hidden="true"><i></i><i></i><i></i></span></button>`
      : `<div class="starWrap">${starHtml}</div>`;
    let checkHtml = isShaoweiWork ? `<div class="starWrap">${starHtml}</div>` : `<div></div>`;
    if(!isShaoweiWork && allowCheck){
      if(sharedReviewPendingForMe){
        checkHtml = `<button class="reviewBtn" data-act="review" data-id="${task.id}" data-source="${source}" type="button" title="點閱後才會真正完成隱藏">閱</button>`;
      }else if(sharedReviewWaitingForOther){
        const waitText = isHandoffTask(task, source) ? '麗卉閱' : '待閱';
        checkHtml = `<button class="reviewPendingBtn" type="button" disabled>${waitText}</button>`;
      }else{
        checkHtml = `<input class="taskCheck" type="checkbox" data-act="check" data-id="${task.id}" data-source="${source}" ${task.done ? 'checked' : ''} title="完成">`;
      }
    }
    return `
      <div class="task ${visualDone ? 'done' : ''} ${isShared ? 'sharedTaskInline' : ''} ${isShaoweiWork ? 'workDraggable' : ''}" ${!isShaowei() ? 'draggable="true"' : ''} data-id="${task.id}" data-source="${source}" data-group="${task.group}" data-category="${task.taskCategory || 'todo'}">
        <div class="taskTop" style="grid-template-columns:${isShaoweiWork ? '34px 28px minmax(0,1fr) auto' : '24px 38px minmax(0,1fr) auto'};">
          ${firstCol}
          ${checkHtml}
          <div class="taskTitle" data-act="open" data-id="${task.id}" data-source="${source}">${escapeHtml(task.title)}</div>
          <div class="taskBtns">
            <button class="miniBtn" data-act="edit-inline" data-id="${task.id}" data-source="${source}" type="button">編輯</button>
            <button class="miniBtn" data-act="delete" data-id="${task.id}" data-source="${source}" type="button">刪除</button>
          </div>
        </div>
        ${meta.length ? `<div class="taskMeta" data-act="open" data-id="${task.id}" data-source="${source}" style="margin-left:${isShaoweiWork ? '76px' : '70px'};">${meta.join(' ｜ ')}</div>` : ''}
      </div>`;
  }


  function repeatItemHtml(task){
    const source = task._source || 'profile';
    const meta = [];
    if(task.dueDate) meta.push(fmtROC(task.dueDate));
    meta.push(repeatBadgeText(task));
    if(task.assignee) meta.push('@' + task.assignee);
    if(task.lihuiAssign) meta.push('麗卉交辦');
    if(source === 'shared') meta.push('共同');
    if(task.note) meta.push(task.note);
    return `
      <div class="repeatItem" data-repeat-id="${task.id}" data-source="${source}">
        <div class="repeatTop">
          <div>
            <div class="repeatTitle" data-act="repeat-open" data-id="${task.id}" data-source="${source}">${escapeHtml(task.title)}</div>
            <div class="repeatMeta">${escapeHtml(meta.join(' ｜ '))}</div>
          </div>
          <div class="repeatBtns">
            <button class="softBtn ${task.repeatEnabled ? 'on' : ''}" data-act="repeat-toggle" data-id="${task.id}" data-source="${source}" type="button">${task.repeatEnabled ? '啟用中' : '已停用'}</button>
            <button class="softBtn" data-act="repeat-open" data-id="${task.id}" data-source="${source}" type="button">修改</button>
            <button class="softBtn" data-act="repeat-delete" data-id="${task.id}" data-source="${source}" type="button">刪除</button>
          </div>
        </div>
      </div>`;
  }

  function bindTaskEvents(){
    document.querySelectorAll('[data-act="check"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      toggleDone(el.dataset.id, el.dataset.source || 'profile');
    });
    document.querySelectorAll('[data-act="open"]').forEach(el => el.onclick = () => {
      const source = el.dataset.source || 'profile';
      const task = getTaskBySource(source, el.dataset.id);
      if(isLihui() && task && task.autoSpawnedFrom){
        openRecurringModal(task.autoSpawnedFrom || task.sourceId || '', task.occurrenceOriginalDate || task.dueDate || '');
        return;
      }
      openSingleTaskModal(el.dataset.id, source);
    });
    document.querySelectorAll('[data-act="edit-inline"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      const source = el.dataset.source || 'profile';
      const task = getTaskBySource(source, el.dataset.id);
      if(task) populateForm(Object.assign({}, task, {_source: source}), { source });
    });
    document.querySelectorAll('[data-act="star"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      toggleStar(el.dataset.id, el.dataset.source || 'profile');
    });
    document.querySelectorAll('[data-act="delete"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      deleteTask(el.dataset.id, el.dataset.source || 'profile');
    });
    document.querySelectorAll('[data-act="sort-up"], [data-act="sort-down"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      moveTaskOneStep(el.dataset.id, el.dataset.source || 'profile', el.dataset.act === 'sort-up' ? -1 : 1);
    });
    document.querySelectorAll('[data-act="review"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      toggleDone(el.dataset.id, el.dataset.source || 'profile');
    });
    document.querySelectorAll('.task').forEach(el => el.onclick = (e) => {
      if(e.target.closest('[data-act]')) return;
      const source = el.dataset.source || 'profile';
      const task = getTaskBySource(source, el.dataset.id);
      if(isLihui() && task && task.autoSpawnedFrom){
        openRecurringModal(task.autoSpawnedFrom || task.sourceId || '', task.occurrenceOriginalDate || task.dueDate || '');
        return;
      }
      openSingleTaskModal(el.dataset.id, source);
    });
  }

  function bindRepeatEvents(){
    document.querySelectorAll('[data-act="repeat-open"]').forEach(el => el.onclick = () => {
      const source = el.dataset.source || 'profile';
      const t = getTaskBySource(source, el.dataset.id);
      if(t) populateForm(Object.assign({}, t, {_source: source}), { source });
    });
    document.querySelectorAll('[data-act="repeat-toggle"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      toggleRepeatEnabled(el.dataset.id, el.dataset.source || 'profile');
    });
    document.querySelectorAll('[data-act="repeat-delete"]').forEach(el => el.onclick = (e) => {
      e.stopPropagation();
      deleteTask(el.dataset.id, el.dataset.source || 'profile');
    });
  }

  function renderRepeatList(){
    const masters = [
      ...state.tasks.filter(t => isRecurringMaster(t)).map(t => Object.assign({}, t, {_source:'profile'})),
      ...sharedState.tasks.filter(t => isRecurringMaster(t)).map(t => Object.assign({}, t, {_source:'shared'}))
    ].sort((a,b) => {
      if(a.repeatEnabled !== b.repeatEnabled) return Number(b.repeatEnabled) - Number(a.repeatEnabled);
      if((a._source === 'shared') !== (b._source === 'shared')) return a._source === 'shared' ? 1 : -1;
      return (a.dueDate || '').localeCompare(b.dueDate || '') || a.title.localeCompare(b.title, 'zh-Hant');
    });
    els.repeatList.innerHTML = masters.length ? masters.map(repeatItemHtml).join('') : '<div class="empty">目前沒有重複任務</div>';
    bindRepeatEvents();
  }

  function renderTags(){
    if(isShaowei()){
      if(els.assigneeTags) els.assigneeTags.innerHTML = '';
      return;
    }
    const baseTasks = [
      ...state.tasks.filter(t => visibleBaseTask(t, 'profile')),
      ...sharedState.tasks.filter(t => visibleBaseTask(t, 'shared'))
    ];
    const users = [...new Set(baseTasks.flatMap(t => splitAssignees(t.assignee)))].sort((a,b) => a.localeCompare(b, 'zh-Hant'));

  function getDisplayGroup(task, source = 'profile'){
    if(isShaowei()){
      if(task.taskCategory === 'work') return 'mid';
      return 'high';

    // 這裡也會修正舊資料原本被存成等待的情況。
    if(task && task.calendarOnly && task.taskCategory !== 'work') return 'high';
    return task.group || (source === 'shared' ? 'mid' : 'high');
  }

  function getDragAfterElement(container, y, options = {}){
    let selector = `.task[data-source="${dragSource || 'profile'}"]:not(.dragging)`;
    if(options.category) selector += `[data-category="${options.category}"]`;
    const items = [...container.querySelectorAll(selector)];
    let closest = {offset: Number.NEGATIVE_INFINITY, element: null};
    items.forEach(el => {
      const box = el.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if(offset < 0 && offset > closest.offset) closest = {offset, element: el};
    });
    return closest.element;
  }

  function clearDropGuides(){
    document.querySelectorAll('.task.dropBefore').forEach(x => x.classList.remove('dropBefore'));
    document.querySelectorAll('.dropZone.dropEnd').forEach(x => x.classList.remove('dropEnd'));
  }

  function applyDropGuide(zone, afterEl){
    clearDropGuides();
    if(afterEl) afterEl.classList.add('dropBefore');
    else zone.classList.add('dropEnd');
  }

  function bindDnD(){
    if(isShaowei()){
      document.querySelectorAll('.dragHandle[data-drag-handle="work"]').forEach(handle => {
        handle.addEventListener('dragstart', e => {
          const taskEl = handle.closest('.task');
          if(!taskEl) return;
          dragId = taskEl.dataset.id;
          dragSource = taskEl.dataset.source || 'profile';
          taskEl.classList.add('dragging');
          if(e.dataTransfer){
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragId);
          }
        });
        handle.addEventListener('dragend', () => {
          const taskEl = handle.closest('.task');
          if(taskEl) taskEl.classList.remove('dragging');
          document.querySelectorAll('.dropZone').forEach(z => z.classList.remove('over'));
          clearDropGuides();
          dragId = '';
          dragSource = 'profile';
        });
      });

      const zone = els.zoneMid;
      if(zone){
        zone.addEventListener('dragover', e => {
          if(!dragId) return;
          e.preventDefault();
          zone.classList.add('over');
          applyDropGuide(zone, getDragAfterElement(zone, e.clientY, {category:'work'}));
        });
        zone.addEventListener('dragleave', e => {
          if(zone.contains(e.relatedTarget)) return;
          zone.classList.remove('over');
          clearDropGuides();
        });
        zone.addEventListener('drop', e => {
          e.preventDefault();
          zone.classList.remove('over');
          const afterEl = getDragAfterElement(zone, e.clientY, {category:'work'});
          clearDropGuides();
          if(!dragId) return;
          const source = dragSource || 'profile';
          const list = source === 'shared' ? sharedState.tasks : state.tasks;
          const task = list.find(x => x.id === dragId);
          if(!task || task.taskCategory !== 'work') return;
          task.group = 'mid';
          const ids = [...zone.querySelectorAll(`.task[data-source="${source}"][data-category="work"]`)].map(el => el.dataset.id).filter(Boolean);

          let newIds;
          if(!afterEl) newIds = ids.filter(id => id !== dragId).concat(dragId);
          else{
            const beforeId = afterEl.dataset.id;
            newIds = [];
            ids.forEach(id => {
              if(id === dragId) return;
              if(id === beforeId) newIds.push(dragId);
              newIds.push(id);
            });
            if(!newIds.includes(dragId)) newIds.push(dragId);
          }
          const visibleWork = list
            .filter(t => visibleBaseTask(t, source) && getDisplayGroup(t, source) === 'mid' && t.taskCategory === 'work')
            .map(t => t.id);
          const seen = new Set(newIds);
          visibleWork.filter(id => !seen.has(id)).forEach(id => newIds.push(id));
          newIds.forEach((id, idx) => {
            const t = list.find(x => x.id === id);
            if(t) t.order = idx + 1;
          });
          persistBySource(source, { statusText: source === 'shared' ? '共同任務已儲存' : '已儲存' });
          renderAll();
        });
      }
      return;
    }

    document.querySelectorAll('.task[data-source]').forEach(taskEl => {
      taskEl.addEventListener('dragstart', e => {
        dragId = taskEl.dataset.id;
        dragSource = taskEl.dataset.source || 'profile';
        taskEl.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      taskEl.addEventListener('dragend', () => {
        taskEl.classList.remove('dragging');
        document.querySelectorAll('.dropZone').forEach(z => z.classList.remove('over'));
        clearDropGuides();
        dragId = '';
        dragSource = 'profile';
      });
    });

    document.querySelectorAll('.dropZone').forEach(zone => {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('over');
        applyDropGuide(zone, getDragAfterElement(zone, e.clientY));
      });
      zone.addEventListener('dragleave', e => {
        if(zone.contains(e.relatedTarget)) return;
        zone.classList.remove('over');
        clearDropGuides();
      });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('over');
        const afterEl = getDragAfterElement(zone, e.clientY);
        clearDropGuides();
        if(!dragId) return;
        const source = dragSource || 'profile';
        const list = source === 'shared' ? sharedState.tasks : state.tasks;
        const targetGroup = zone.id === 'zoneHigh' ? 'high' : zone.id === 'zoneMid' ? 'mid' : 'wait';
        const task = list.find(x => x.id === dragId);
        if(!task) return;
        task.group = targetGroup;
        const ids = [...zone.querySelectorAll(`.task[data-source="${source}"]`)].map(el => el.dataset.id).filter(Boolean);

        let newIds;
        if(!afterEl) newIds = ids.filter(id => id !== dragId).concat(dragId);
        else{
          const beforeId = afterEl.dataset.id;
          newIds = [];
          ids.forEach(id => {
            if(id === dragId) return;
            if(id === beforeId) newIds.push(dragId);
            newIds.push(id);
          });
          if(!newIds.includes(dragId)) newIds.push(dragId);
        }

        const visibleSameGroup = list
          .filter(t => visibleBaseTask(t, source) && getDisplayGroup(t, source) === targetGroup)
          .map(t => t.id);
        const seen = new Set(newIds);
        visibleSameGroup.filter(id => !seen.has(id)).forEach(id => newIds.push(id));
        newIds.forEach((id, idx) => {
          const t = list.find(x => x.id === id);
          if(t) t.order = idx + 1;
        });

        persistBySource(source, { statusText: source === 'shared' ? '共同任務已儲存' : '已儲存' });
        renderAll();
      });
    });
  }

  function compareVisibleTasksForBoard(a, b){
    if(isShaowei()){
      const aWork = a.taskCategory === 'work';
      const bWork = b.taskCategory === 'work';
      if(aWork && bWork){
        const starDiff = Number(!!b.isStarred) - Number(!!a.isStarred);
        if(starDiff) return starDiff;
        return orderVal(a.order) - orderVal(b.order) || (a.createdAt || '').localeCompare(b.createdAt || '');
      }
      const aNoDate = a.dueDate ? 1 : 0;
      const bNoDate = b.dueDate ? 1 : 0;
      if(aNoDate !== bNoDate) return aNoDate - bNoDate;
      const aShared = a._source === 'shared' ? 0 : 1;
      const bShared = b._source === 'shared' ? 0 : 1;
      if(aShared !== bShared) return aShared - bShared;
      const starDiff = Number(!!b.isStarred) - Number(!!a.isStarred);
      if(starDiff) return starDiff;
      const ad = a.dueDate || '9999-12-31';
      const bd = b.dueDate || '9999-12-31';
      return ad.localeCompare(bd) || orderVal(a.order) - orderVal(b.order);
    }
    return (Number(!!b.isStarred)-Number(!!a.isStarred)) || (orderVal(a.order) - orderVal(b.order)) || (a._source === 'shared' ? 1 : -1);
  }

  function moveTaskOneStep(id, source = 'profile', direction = 1){
    const task = getTaskBySource(source, id);
    if(!task) return;
    const displayGroup = getDisplayGroup(task, source);
    const same = visibleTasks()
      .filter(t => t._source === source && getDisplayGroup(t, source) === displayGroup && (isShaowei() ? (t.taskCategory || 'todo') === (task.taskCategory || 'todo') : true))
      .sort(compareVisibleTasksForBoard);
    const index = same.findIndex(t => t.id === id);
    const nextIndex = index + direction;
    if(index < 0 || nextIndex < 0 || nextIndex >= same.length) return;
    const ids = same.map(t => t.id);
    [ids[index], ids[nextIndex]] = [ids[nextIndex], ids[index]];
    const list = getTaskListBySource(source);
    ids.forEach((taskId, idx) => {
      const item = list.find(x => x.id === taskId);
      if(item) item.order = idx + 1;
    });
    persistBySource(source, { statusText: source === 'shared' ? '共同任務已儲存' : '已儲存' });
    renderAll();
  }

  function calendarItemsForDay(dayKey){
    const baseItems = state.tasks.filter(t => {
      if(isRecurringMaster(t)) return false;
      if(currentFilterUser && !splitAssignees(t.assignee).includes(currentFilterUser)) return false;
      return t.dueDate === dayKey;
    });

    const recurringPreview = [];
    state.tasks.forEach(t => {
      if(!t.repeatEnabled || !t.repeatType || !t.dueDate || t.autoSpawnedFrom) return;
      if(currentFilterUser && !splitAssignees(t.assignee).includes(currentFilterUser)) return false;
      const occurs = computeOccurrencesForSingleDay(t, dayKey);
      if(occurs){
        const spawnedExists = state.tasks.some(x => x.autoSpawnedFrom === t.id && x.dueDate === dayKey);
        if(!spawnedExists){
          recurringPreview.push({
            preview:true,
            sourceId:t.id,
            title:t.title,
            dueDate:dayKey,
            assignee:t.assignee,
            note:t.note,
            repeatType:t.repeatType,
            repeatEvery:t.repeatEvery,
            done:false
          });
        }
      }
    });

    const merged = [...baseItems, ...recurringPreview];
    const seen = new Set();
    return merged.filter(item => {
      const key = (item.id || 'preview_'+item.sourceId)+'_'+item.dueDate;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    }).sort((a,b)=>{
      if(Number(!!a.done) !== Number(!!b.done)) return Number(!!a.done) - Number(!!b.done);
      return orderVal(a.order)-orderVal(b.order);
    });
  }

  function describeSupabaseError(err){
    if(!err) return '未知錯誤';
    const parts = [err.message, err.details, err.hint].filter(Boolean).map(v => String(v));
    const raw = parts.join(' ｜ ') || String(err);
    const normalized = raw.toLowerCase();

    if(normalized.includes('failed to fetch') || normalized.includes('networkerror')) return '連不到 Supabase，請檢查網路或 Project URL 是否正確';
    if(normalized.includes('invalid api key') || normalized.includes('invalidapikey') || normalized.includes('jwt')) return 'Publishable Key 可能錯誤或已失效';
    if(normalized.includes('relation') && normalized.includes('todo_app_state') && normalized.includes('does not exist')) return '找不到 todo_app_state 資料表';
    if(normalized.includes('row-level security') || normalized.includes('violates row-level security policy')) return '資料表被 RLS 權限擋住，請檢查 select / insert / update policy';
    if(normalized.includes('permission denied')) return '資料表權限不足，請檢查 Supabase policy';
    if(normalized.includes('on conflict') && normalized.includes('constraint')) return 'app_name 可能還沒設唯一鍵，upsert 無法使用';
    if(normalized.includes('duplicate key value')) return 'app_name 或其他唯一鍵重複，請檢查資料表限制';
    if(normalized.includes('column') && normalized.includes('does not exist')) return raw.replace(/\s+/g, ' ').slice(0, 140);
    if(normalized.includes('invalid input syntax')) return '資料格式不符，請檢查資料表欄位型態';

    return raw.replace(/\s+/g, ' ').slice(0, 160);
  }

  async function fetchSupabaseRowLatest(appName, selectList){
    const attempts = [
      { orderByUpdatedAt: true, selectList },
      { orderByUpdatedAt: false, selectList }
    ];
    let lastError = null;
    for(const attempt of attempts){
      try{
        let query = supabaseClient.from(SUPABASE_TABLE).select(selectList).eq('app_name', appName);
        if(attempt.orderByUpdatedAt) query = query.order('updated_at', { ascending: false });
        const { data, error } = await query.limit(1);
        if(error){ lastError = error; continue; }
        return { row: Array.isArray(data) && data.length ? data[0] : null, error: null };
      }catch(err){
        lastError = err;
      }
    }
    return { row: null, error: lastError };
  }

  async function updateOrInsertSupabaseRow(payload){
    const baseState = payload && payload.state_json && typeof payload.state_json === 'object' ? payload.state_json : {};
    const payloadAttempts = [
      payload,
      { ...payload, state_json: { ...baseState }, todo_note_text: undefined },
      { ...payload, state_json: { ...baseState }, memo_text: undefined },
      { ...payload, state_json: { ...baseState }, memo_text: undefined, todo_note_text: undefined },
      { app_name: payload.app_name, state_json: { ...baseState }, updated_at: payload.updated_at }
    ].map(item => Object.fromEntries(Object.entries(item).filter(([, value]) => value !== undefined)));

    let lastError = null;
    for(const candidate of payloadAttempts){
      try{
        const primary = await supabaseClient
          .from(SUPABASE_TABLE)
          .upsert(candidate, { onConflict: 'app_name' })
          .select('updated_at')
          .limit(1);
        if(!primary.error) return { data: Array.isArray(primary.data) ? primary.data[0] : primary.data, error: null, usedPayload: candidate };
        lastError = primary.error;

        const fallbackUpdate = await supabaseClient
          .from(SUPABASE_TABLE)
          .update(candidate)
          .eq('app_name', candidate.app_name)
          .select('updated_at');
        if(!fallbackUpdate.error && Array.isArray(fallbackUpdate.data) && fallbackUpdate.data.length){
          return { data: fallbackUpdate.data[0], error: null, usedPayload: candidate };
        }
        if(fallbackUpdate.error) lastError = fallbackUpdate.error;

        const fallbackInsert = await supabaseClient
          .from(SUPABASE_TABLE)
          .insert(candidate)
          .select('updated_at')
          .limit(1);
        if(!fallbackInsert.error){
          return { data: Array.isArray(fallbackInsert.data) ? fallbackInsert.data[0] : fallbackInsert.data, error: null, usedPayload: candidate };
        }
        lastError = fallbackInsert.error;
      }catch(err){
        lastError = err;
      }
    }
    return { data: null, error: lastError, usedPayload: null };
  }

  async function loadFromSupabase(forceApply = true){
    if(!supabaseClient) return false;
    try{
      const selectors = [
        'state_json,memo_text,todo_note_text,updated_at',
        'state_json,memo_text,updated_at',
        'state_json,memo_text,todo_note_text',
        'state_json,memo_text',
        'state_json'
      ];
      let row = null;
      let lastError = null;
      for(const selector of selectors){
        const result = await fetchSupabaseRowLatest(getRemoteAppName(), selector);
        if(result && !result.error){
          row = result.row;
          lastError = null;
          break;
        }
        lastError = result.error;
      }
      if(lastError) throw lastError;
      if(!row) {
        updateSupabaseStatus(syncEnabled ? '已連線（尚無雲端資料）' : '已載入設定');
        setSupabaseErrorDetail('');
        return false;
      }
      const remoteUpdatedAt = row.updated_at || '';
      if(remoteUpdatedAt) updateLastSyncText(remoteUpdatedAt);
      if(!forceApply && lastRemoteUpdatedAt && remoteUpdatedAt && remoteUpdatedAt <= lastRemoteUpdatedAt) return false;
      isApplyingRemote = true;
      const remoteTasks = row.state_json && Array.isArray(row.state_json.tasks)
        ? row.state_json.tasks.map(normalizeLegacyTask).filter(t => t.title)
        : [];
      state.tasks = remoteTasks;
      state.memo = row.memo_text || '';
      state.handoffMemo = String(row.state_json && row.state_json.handoffMemo || '');
      state.todoNote = row.todo_note_text || String(row.state_json && row.state_json.todoNote || '');
      if(els.memoBox) els.memoBox.value = state.memo;
      const handoffMemoBox = getHandoffMemoBox();
      if(handoffMemoBox) handoffMemoBox.value = state.handoffMemo;
      const todoNoteBox = getProfileTodoNoteBox();
      if(todoNoteBox) todoNoteBox.value = state.todoNote;
      saveAppStateLocally();
      lastRemoteUpdatedAt = remoteUpdatedAt || lastRemoteUpdatedAt;
      updateSupabaseStatus(syncEnabled ? '已連線（即時同步中）' : '已載入雲端');
      setSupabaseErrorDetail('');
      return true;
    }catch(err){
      console.error('Supabase 載入失敗', err);
      showSupabaseError('讀取失敗', err);
      return false;
    }finally{
      isApplyingRemote = false;
    }
  }

  async function loadSharedFromSupabase(forceApply = true){
    if(!supabaseClient) return false;
    try{
      const selectors = ['state_json,memo_text,updated_at', 'state_json,updated_at', 'state_json'];
      let row = null;

      for(const selector of selectors){

          break;
        }

      if(!row) return false;
      const remoteUpdatedAt = row.updated_at || '';
      if(!forceApply && lastSharedRemoteUpdatedAt && remoteUpdatedAt && remoteUpdatedAt <= lastSharedRemoteUpdatedAt) return false;
      isApplyingRemote = true;
