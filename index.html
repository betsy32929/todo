        els.workTaskBtn.setAttribute('aria-pressed', 'false');
      }
      setCommonFormActive(true);
      if(!title && !editingId && !editingSharedId){
        if(els.titleInput) els.titleInput.focus();
        return;
      }
      saveTask('high', false, { forceCommon: true });
    });
  }
  if(els.workTaskBtn){
    els.workTaskBtn.addEventListener('click', () => {
      const title = (els.titleInput && els.titleInput.value || '').trim();
      if(!title && !editingId && !editingSharedId){
        alert('請先輸入事項');
        if(els.titleInput) els.titleInput.focus();
        return;
      }
      if(els.lihuiAssignBtn){
        els.lihuiAssignBtn.dataset.active = '0';
        els.lihuiAssignBtn.classList.remove('active');
        els.lihuiAssignBtn.setAttribute('aria-pressed', 'false');
      }
      setCommonFormActive(false);
      els.workTaskBtn.dataset.active = '1';
      els.workTaskBtn.classList.add('active');
      els.workTaskBtn.setAttribute('aria-pressed', 'true');
      saveTask('mid', false, { taskCategory: 'work' });
    });
  }
  els.memoBox.addEventListener('input', saveMemo);
  const handoffMemoBox = getHandoffMemoBox();
  if(handoffMemoBox) handoffMemoBox.addEventListener('input', saveHandoffMemo);
  const todoNoteBox = getProfileTodoNoteBox();
  if(todoNoteBox) todoNoteBox.addEventListener('input', saveTodoNote);
  const sharedMemoBox = getSharedMemoBox();
  if(sharedMemoBox) sharedMemoBox.addEventListener('input', saveSharedMemo);
  if(els.switchLihui) els.switchLihui.addEventListener('click', () => { switchProfile('lihui'); });
  if(els.switchShaowei) els.switchShaowei.addEventListener('click', () => { switchProfile('shaowei'); });
  els.btnConnect.addEventListener('click', connectSupabase);
  els.btnSync.addEventListener('click', syncNow);
  els.btnDisconnect.addEventListener('click', disconnectSupabase);
  els.toggleDone.addEventListener('change', e => { showDone = e.target.checked; renderAll(); });
  els.modalCloseBtn.addEventListener('click', closeRecurringModal);
  els.recurringModal.addEventListener('click', e => { if(e.target === els.recurringModal) closeRecurringModal(); });
  els.modalCloseSingleTaskBtn.addEventListener('click', closeSingleTaskModal);
  els.singleTaskModal.addEventListener('click', e => { if(e.target === els.singleTaskModal) closeSingleTaskModal(); });
  els.modalCompleteOccurrenceBtn.addEventListener('click', () => {
    if(els.modalCompleteOccurrenceBtn.disabled) return;
    const masterId = els.recurringModal.dataset.masterId || '';
    const occurrenceDate = els.recurringModal.dataset.occurrenceDate || '';
    if(masterId && occurrenceDate) completeRecurringOccurrenceEarly(masterId, occurrenceDate);
  });
  els.modalEditOccurrenceBtn.addEventListener('click', () => {
    const masterId = els.recurringModal.dataset.masterId || '';
    const occurrenceDate = els.recurringModal.dataset.occurrenceDate || '';
    if(masterId && occurrenceDate) editRecurringOccurrence(masterId, occurrenceDate);
  });
  els.modalEditSeriesBtn.addEventListener('click', () => {
    const masterId = els.recurringModal.dataset.masterId || '';
    if(masterId) editRecurringSeries(masterId);
  });
  els.modalEditSingleTaskBtn.addEventListener('click', () => {
    const taskId = els.singleTaskModal.dataset.taskId || '';
    const source = els.singleTaskModal.dataset.taskSource || 'profile';
    if(taskId) editSingleTaskFromModal(taskId, source);
  });
  els.modalCompleteSingleTaskBtn.addEventListener('click', () => {
    if(els.modalCompleteSingleTaskBtn.disabled) return;
    const taskId = els.singleTaskModal.dataset.taskId || '';
    const source = els.singleTaskModal.dataset.taskSource || 'profile';
    if(taskId) completeSingleTaskFromModal(taskId, source);
  });
  els.modalCompleteNextSingleTaskBtn.addEventListener('click', () => {
    if(els.modalCompleteNextSingleTaskBtn.disabled) return;
    const taskId = els.singleTaskModal.dataset.taskId || '';
    const source = els.singleTaskModal.dataset.taskSource || 'profile';
    if(taskId) completeAndScheduleNextFromModal(taskId, source);
  });

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && els.singleTaskModal.classList.contains('show')){
      closeSingleTaskModal();
      return;
    }
    if(e.key === 'Escape' && els.recurringModal.classList.contains('show')){
      closeRecurringModal();
      return;
    }
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's'){
      e.preventDefault();
      saveTask('mid');
    }
  });

  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible' && supabaseClient && syncEnabled){
      Promise.all([loadFromSupabase(false), loadSharedFromSupabase(false)]).then(([a,b]) => { if(a || b) renderAll(); });
    }
  });

  window.addEventListener('online', () => {
    if(supabaseClient && syncEnabled){
      Promise.all([loadFromSupabase(false), loadSharedFromSupabase(false)]).then(([a,b]) => { if(a || b) renderAll(); });
    }
  });


  async function tryAutoConnectSupabase(){
    const settings = getSupabaseSettings();
    if(!settings.url || !settings.key) return false;
    els.supabaseUrlInput.value = settings.url;
    els.supabaseKeyInput.value = settings.key;
    try{
      if(els.supabaseStatusBadge) els.supabaseStatusBadge.textContent = '連線中';
      if(els.supabaseStatusText) els.supabaseStatusText.textContent = '正在自動連線 Supabase...';
      initSupabaseClient();
      syncEnabled = true;
      if(els.supabaseStatusBadge) els.supabaseStatusBadge.textContent = '已連線';
      if(els.supabaseStatusText) els.supabaseStatusText.textContent = '已自動連線雲端即時同步。';
      await loadFromSupabase();
      await loadSharedFromSupabase();
      startRemotePolling();
      startRemoteSubscription();
      return true;
    }catch(err){
      console.error(err);
      syncEnabled = false;
      if(els.supabaseStatusBadge) els.supabaseStatusBadge.textContent = '未連線';
      if(els.supabaseStatusText) els.supabaseStatusText.textContent = '自動連線失敗，請檢查設定。';
      return false;
    }
  }

  appState = loadAppState();
  currentProfile = appState.activeProfile === 'shaowei' ? 'shaowei' : DEFAULT_PROFILE;
  bindStateFromProfile();
  loadMemo();
  loadHandoffMemo();
  loadTodoNote();
  loadSharedMemo();
  loadSupabaseSettings();
  updateLastSyncText('');
  initDatePickers();
  renderAll();
  remoteLoadFinished = true;
  tryAutoConnectSupabase().then(changed => { if(changed) renderAll(); });
  setInterval(renderClock, 1000);
})();
</script>
</body>
</html>
